<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" width="320" height="64">
  <!-- Background dark -->
  <rect width="320" height="64" fill="#111111" rx="0"/>

  <!-- Icon: rounded square green -->
  <rect x="10" y="10" width="44" height="44" rx="11" fill="#22DD66"/>
  <!-- W letter -->
  <text
    x="32"
    y="40"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="22"
    font-weight="700"
    fill="#111111"
    text-anchor="middle"
  >W</text>

  <!-- "WABeres" bold white -->
  <text
    x="64"
    y="39"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="20"
    font-weight="700"
    fill="#FFFFFF"
    dominant-baseline="middle"
    dy="0"
  >
    <tspan fill="#FFFFFF">WA</tspan><tspan fill="#22DD66">Beres</tspan>
  </text>

  <!-- Divider line -->
  <line x1="183" y1="18" x2="183" y2="46" stroke="#444444" stroke-width="1.5"/>

  <!-- "docs" label muted gray, lighter weight — Mintlify style -->
  <text
    x="194"
    y="32"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="18"
    font-weight="400"
    fill="#888888"
    dominant-baseline="middle"
  >docs</text>
</svg>
